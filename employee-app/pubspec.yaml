name: worknav_employee_app
description: 工作导航（StepByStep）员工端 - 为心智障碍人士提供工作支持的移动应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # 网络请求
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # 本地存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1

  # 本地通知
  flutter_local_notifications: ^16.3.0

  # 图片选择
  image_picker: ^1.0.5

  # 震动反馈
  vibration: ^1.8.4

  # 音频播放
  just_audio: ^0.9.36

  # 状态管理
  provider: ^6.1.1

  # 图片缓存
  cached_network_image: ^3.3.0

  # TTS 语音合成（降级方案）
  flutter_tts: ^3.8.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
